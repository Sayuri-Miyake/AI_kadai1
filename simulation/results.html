    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 24px 20px 40px;
    }

      text-align: center;
      margin-bottom: 24px;
    }

      font-size: 1.35rem;
      font-weight: 600;
      color: #79c0ff;
      margin-bottom: 6px;
    }

      font-size: 0.85rem;
      color: #8b949e;
    }

      color: #e3b341;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      max-width: 1280px;
      margin: 0 auto;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }

    .card-title {
      padding: 10px 16px 0;
      font-size: 0.82rem;
      color: #8b949e;
      letter-spacing: 0.03em;
    }

    .plot { width: 100%; height: 360px; }

    footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.75rem;
      color: #484f58;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  </div>
  <div class="card">

  </div>
  <div class="card">
    <div class="card-title">Binder キュムラント &nbsp; U<sub>L</sub> = 1 − ⟨m⁴⟩ / (3⟨m²⟩²)</div>

// ── Parse ──────────────────────────────────────────────────────────────────
const rows = RAW.trim().split('\n').slice(1).map(line => {
    const [L, T, m, chi, C, UL] = line.split(',').map(Number);
    return { L, T, m, chi, C, UL };
});

const SIZES  = [8, 16, 32, 64];
const COLORS = ['#58a6ff', '#f0883e', '#56d364', '#ff7b72'];
const TC     = 2.269185314213022;

// Group by system size
const byL = {};
for (const r of rows) (byL[r.L] ??= []).push(r);

// ── Plotly config ──────────────────────────────────────────────────────────
const CFG = { responsive: true, displayModeBar: false };

// ── Dark layout template ───────────────────────────────────────────────────
function layout(yTitle, yRange, extraShapes) {
    const shapes = [
        // Vertical line at T_c (Onsager)
        {
            type: 'line', xref: 'x', yref: 'paper',
            x0: TC, x1: TC, y0: 0, y1: 1,
            line: { color: 'rgba(255, 240, 120, 0.55)', width: 1.5, dash: 'dash' }
        },
        ...(extraShapes || [])
    ];
    const annotations = [
        {
            xref: 'x', yref: 'paper',
            x: TC + 0.02, y: 0.97, text: 'T<sub>c</sub>',
            showarrow: false,
            font: { color: 'rgba(255,240,120,0.75)', size: 11 },
            xanchor: 'left'
        }
    ];
    return {
        paper_bgcolor: '#161b22',
        plot_bgcolor:  '#0d1117',
        font: { color: '#8b949e', size: 12 },
        xaxis: {
            title: { text: 'T / J', font: { size: 12 } },
            color: '#8b949e',
            gridcolor: '#21262d',
            zerolinecolor: '#21262d',
            linecolor: '#30363d',
        },
        yaxis: {
            title: { text: yTitle, font: { size: 12 } },
            color: '#8b949e',
            gridcolor: '#21262d',
            zerolinecolor: '#21262d',
            linecolor: '#30363d',
            ...(yRange ? { range: yRange } : {}),
        },
        legend: {
            bgcolor: 'rgba(22,27,34,0.85)',
            bordercolor: '#30363d',
            borderwidth: 1,
            font: { size: 11 },
        },
        margin: { t: 16, b: 50, l: 60, r: 16 },
        hovermode: 'x unified',
        hoverlabel: { bgcolor: '#1c2128', bordercolor: '#30363d', font: { size: 11 } },
        shapes,
        annotations,
    };
}

// ── Build one set of traces for a given observable key ─────────────────────
function traces(key, fmt) {
    return SIZES.map((L, i) => ({
        x:    byL[L].map(r => r.T),
        y:    byL[L].map(r => r[key]),
        name: `L = ${L}`,
        mode: 'lines+markers',
        line:   { color: COLORS[i], width: 2 },
        marker: { color: COLORS[i], size: 5 },
        hovertemplate: `T=%{x:.3f}  ${key}=%{y:${fmt}}<extra>L=${L}</extra>`,
    }));
}

// ── Plot 1: Magnetization ⟨|m|⟩ ───────────────────────────────────────────
Plotly.newPlot('p-m', traces('m', '.4f'),
    layout('⟨|m|⟩', [0, 1.06]),
    CFG);

// ── Plot 2: Susceptibility χ ───────────────────────────────────────────────

// ── Plot 3: Specific heat C ────────────────────────────────────────────────

const ulLayout = layout('U<sub>L</sub>', null, binderShapes);
